<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Community Hub - A space for mindful practice and togetherness">
    <meta name="theme-color" content="#000000">
    
    <title>The Community Hub - Our Space for togetherness</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="community-hub.css">
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.min.js" defer></script>

    <!-- Inline Critical Styles -->
    <style>
        /* Practice Room View Container */
        #practiceRoomView {
            display: none;
            padding: 0;
            min-height: 100vh;
            background: var(--background);
        }

        #practiceRoomView.active {
            display: block;
        }

        .back-to-hub-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .back-to-hub-btn:hover {
            background: var(--border);
            transform: translateX(-4px);
        }

        #dynamicRoomContent {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Season Flash Notification -->
    <div class="season-flash" id="seasonFlash" aria-live="polite"></div>

    <!-- WhatsApp Community Link -->
    <a href="https://chat.whatsapp.com/HQGczWRf70tGqIspByIrL4" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="whatsapp-float"
       aria-label="Join our Community Chat on WhatsApp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" 
             alt="WhatsApp" 
             width="24" 
             height="24">
        <span>Join our Community Chat</span>
    </a>

    <!-- Main Hub View -->
    <div id="hubView" class="view active">
        <!-- Profile Hero - Dynamically rendered -->
        <div id="profileHeroContainer"></div>

        <!-- Sanctuary Content -->
        <div class="sanctuary-content">
            <!-- Active Members - Dynamically rendered -->
            <div id="activeMembersContainer"></div>

            <!-- Collective Field - Dynamically rendered -->
            <div id="collectiveFieldContainer"></div>

            <!-- Resonance - Dynamically rendered (currently disabled) -->
            <div id="resonanceContainer"></div>

            <!-- Practice Spaces Section -->
            <section class="section" aria-labelledby="practiceSpacesTitle">
                <div class="section-header">
                    <div class="section-title" id="practiceSpacesTitle">Practice Spaces</div>
                    <div style="font-size: 12px; color: var(--text-muted);">Choose your practice</div>
                </div>
                <div class="rooms-grid" id="roomsGrid">
                    <!-- Rooms dynamically rendered by core.js -->
                </div>
            </section>

            <!-- Celestial Cycles Section -->
            <section class="section" aria-labelledby="celestialCyclesTitle">
                <div class="section-header">
                    <div class="section-title" id="celestialCyclesTitle">Celestial Cycles</div>
                    <div style="font-size: 12px; color: var(--text-muted);">Practice with nature's rhythms</div>
                </div>
                
                <!-- Lunar Phases -->
                <div id="lunarContainer" class="celestial-container">
                    <!-- Lunar rooms dynamically rendered -->
                </div>

                <!-- Solar Seasons -->
                <div id="solarContainer" class="celestial-container">
                    <!-- Solar rooms dynamically rendered -->
                </div>
            </section>

            <!-- Community Reflections - Dynamically rendered -->
            <div id="communityReflectionsContainer"></div>

            <!-- Upcoming Events - Dynamically rendered -->
            <div id="upcomingEventsContainer"></div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <!-- ========================================================================== -->
    <!-- FULLSCREEN ROOM CONTAINER (outside main flow for fullscreen rooms) -->
    <!-- ========================================================================== -->
    <div id="communityHubFullscreenContainer" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background: transparent; display: none; overflow: auto;">
        <!-- Ritual Overlays -->
        <div class="ritual-overlay opening" id="openingOverlay" role="dialog" aria-labelledby="openingRitualText">
            <div class="ritual-card">
                <div class="ritual-candle" aria-hidden="true"></div>
                <div class="ritual-text" id="openingRitualText">"Enter with intention, leave with gratitude"</div>
                <button class="ritual-btn" data-action="ritual-opening" aria-label="Enter the space">
                    Enter the Space
                </button>
            </div>
        </div>

        <div class="ritual-overlay closing" id="closingOverlay" role="dialog" aria-labelledby="closingRitualText">
            <div class="ritual-card">
                <div class="ritual-candle" aria-hidden="true"></div>
                <div class="ritual-text" id="closingRitualText">"Thank you for holding space with us"</div>
                <button class="ritual-btn" data-action="ritual-closing" aria-label="Close gently">
                    Close Gently
                </button>
            </div>
        </div>

        <!-- Practice Room View -->
        <div id="practiceRoomView" class="view" style="min-height: 100vh; padding: 0; margin: 0;">
            <div class="practice-room-container" style="padding: 0; margin: 0;">
                <button class="back-to-hub-btn" 
                        data-action="back-to-hub" 
                        aria-label="Back to hub"
                        style="margin: 20px;">
                    ← Back to Hub
                </button>
                <div id="dynamicRoomContent"></div>
            </div>
        </div>
    </div>

    <!-- ========================================================================== -->
    <!-- CORE SCRIPTS - Load in strict dependency order -->
    <!-- ========================================================================== -->
    
    <!-- 1. Core System -->
    <script src="js/core.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/rituals.js"></script>
    
    <!-- 2. Module Scripts -->
    <script src="js/profile-module.js"></script>
    <script src="js/community-module.js"></script>
    <script src="js/member-profile-modal.js"></script>
    <script src="js/WhisperModal.js"></script>
    <script src="js/SafetyBar.js"></script>
    
    <!-- ========================================================================== -->
    <!-- PRACTICE ROOM MODULES -->
    <!-- ========================================================================== -->
<!-- Base Class (Required First) -->
<script src="js/Rooms/PracticeRoom.js"></script>

<!-- Mixins (Load before rooms that use them) -->
<script src="js/Rooms/mixins/YouTubePlayerMixin.js"></script>
<script src="js/Rooms/mixins/CycleStateMixin.js"></script>
<script src="js/Rooms/mixins/ChatMixin.js"></script>
<script src="js/Rooms/mixins/SoundSettingsMixin.js"></script>
<script src="js/Rooms/mixins/TimerMixin.js"></script>

  <!-- Rooms -->  
    <script src="js/Rooms/silent-room.js"></script>
    <script src="js/Rooms/guided-room.js"></script>
    <script src="js/Rooms/osho-room.js"></script>
    <script src="js/Rooms/breathwork-room.js"></script>
    <script src="js/Rooms/deepwork-room.js"></script>
    <script src="js/Rooms/campfire-room.js"></script>
    <script src="js/Rooms/tarot-room.js"></script>
    <script src="js/Rooms/reiki-room.js"></script>
    
    <!-- ========================================================================== -->
    <!-- LUNAR SYSTEM - Load in order -->
    <!-- ========================================================================== -->
    
    <!-- Lunar Core Functionality -->
    <script src="js/Lunar/lunar-core.js"></script>
    <script src="js/Lunar/lunar-ui.js"></script>
    <script src="js/Lunar/lunar-config.js"></script>
    
    <!-- Lunar Engine -->
    <script src="js/Lunar/lunarengine.js"></script>
    
    <!-- Lunar Room Configurations -->
    <script src="js/Lunar/newmoon-room.js"></script>
    <script src="js/Lunar/waxingmoon-room.js"></script>
    <script src="js/Lunar/fullmoon-room.js"></script>
    <script src="js/Lunar/waningmoon-room.js"></script>
    
    <!-- ========================================================================== -->
    <!-- SOLAR SYSTEM - CRITICAL: Load in this exact order! -->
    <!-- ========================================================================== -->
    
    <!-- 1. Solar Constants (MUST be first) -->
    <script src="js/Solar/solar-constants.js"></script>
    <script src="js/Solar/solar-config.js"></script>  

    <!-- 2. Solar UI Manager -->
    <script src="js/Solar/solar-ui.js"></script>
    
    <!-- 3. Solar Base Room (MUST come before individual rooms) -->
    <script src="js/Solar/solar-base-room.js"></script>
    
    <!-- 4. Individual Season Rooms (order doesn't matter among these) -->
    <script src="js/Solar/winter-solar-room.js"></script>
    <script src="js/Solar/spring-solar-room.js"></script>
    <script src="js/Solar/summer-solar-room.js"></script>
    <script src="js/Solar/autumn-solar-room.js"></script>
    
    <!-- 5. Solar Engine (MUST be last) -->
    <script src="js/Solar/solarengine.js"></script>
    
    <!-- ========================================================================== -->
    <!-- DYNAMIC SECTION MODULES -->
    <!-- ========================================================================== -->
    
    <script src="js/active-members.js"></script>
    <script src="js/collective-field.js"></script>
    <script src="js/resonance.js"></script>
    <script src="js/upcoming-events.js"></script>
    
    <!-- ========================================================================== -->
    <!-- APPLICATION INITIALIZATION -->
    <!-- ========================================================================== -->
    
    <script>
        /**
         * Global event delegation handler for the entire application
         */
        document.addEventListener('click', (e) => {
            const actionBtn = e.target.closest('[data-action]');
            if (!actionBtn) return;

            const action = actionBtn.dataset.action;

            try {
                switch (action) {
                    case 'back-to-hub':
                        if (window.Rituals) {
                            Rituals.showClosing();
                        }
                        break;
                    
                    case 'switch-mode':
                        // Mode switching handled by individual lunar room instances
                        const mode = actionBtn.dataset.mode;
                        const roomContainer = actionBtn.closest('.lunar-content-wrapper, [class*="-content-wrapper"]');
                        
                        if (roomContainer) {
                            // Find the active lunar room and call its switchMode method
                            if (window.NewMoonRoom?.isActive) {
                                window.NewMoonRoom.switchMode(mode);
                            } else if (window.WaxingMoonRoom?.isActive) {
                                window.WaxingMoonRoom.switchMode(mode);
                            } else if (window.FullMoonRoom?.isActive) {
                                window.FullMoonRoom.switchMode(mode);
                            } else if (window.WaningMoonRoom?.isActive) {
                                window.WaningMoonRoom.switchMode(mode);
                            }
                        }
                        break;
                }
            } catch (error) {
                console.error('Action handler error:', action, error);
            }
        });

        /**
         * Initialize application with error handling
         */
        function initializeApp() {
            try {
                console.log('🌟 Initializing Community Hub...');
                
                if (!window.Core) {
                    console.error('Core module not found!');
                    return;
                }
                
                Core.init();
                console.log('✅ Community Hub initialized successfully');
            } catch (error) {
                console.error('❌ Application initialization failed:', error);
                
                // Show user-friendly error message
                const toast = document.getElementById('toast');
                if (toast) {
                    toast.textContent = 'Failed to initialize. Please refresh the page.';
                    toast.classList.add('show');
                }
            }
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
