<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📱 Notification Diagnostic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 10px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    .content { padding: 20px; }
    
    .test-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #e0e0e0;
    }
    .test-item.pass { border-color: #4caf50; background: #e8f5e9; }
    .test-item.fail { border-color: #f44336; background: #ffebee; }
    .test-item.warn { border-color: #ff9800; background: #fff3e0; }
    
    .test-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .test-icon {
      font-size: 24px;
      width: 30px;
      text-align: center;
    }
    .test-title {
      font-weight: 600;
      font-size: 16px;
      flex: 1;
    }
    .test-details {
      font-size: 14px;
      color: #666;
      margin-left: 40px;
      line-height: 1.6;
    }
    
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn.secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .summary {
      background: #f1f3f4;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .summary-item:last-child { border-bottom: none; }
    
    .action-needed {
      background: #fff3e0;
      border: 2px solid #ff9800;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .action-needed h3 {
      color: #f57c00;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .action-needed ul {
      margin-left: 20px;
      color: #666;
    }
    .action-needed li {
      margin: 5px 0;
      line-height: 1.5;
    }

    .copy-btn {
      background: #4caf50;
      color: white;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📱 Notification Diagnostic</h1>
      <p>Testing your push notification setup</p>
    </div>
    
    <div class="content">
      <button class="btn" id="runTest">🔍 Run Diagnostic</button>
      <button class="btn secondary" id="fixIssues" style="display:none;">🔧 Auto-Fix Issues</button>
      
      <div id="results"></div>
    </div>
  </div>

  <script type="module">
    let diagnosticData = {};

    document.getElementById('runTest').addEventListener('click', runDiagnostic);
    document.getElementById('fixIssues').addEventListener('click', autoFix);

    async function runDiagnostic() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Running tests...</p></div>';
      
      diagnosticData = {
        tests: [],
        summary: {
          passed: 0,
          failed: 0,
          warnings: 0
        },
        needsFix: []
      };

      await new Promise(resolve => setTimeout(resolve, 500));

      // Test 1: Service Worker
      await testServiceWorker();
      
      // Test 2: Push Manager
      await testPushManager();
      
      // Test 3: Permission
      await testPermission();
      
      // Test 4: Active Subscription
      await testSubscription();
      
      // Test 5: Database Check
      await testDatabase();
      
      // Test 6: Settings
      await testSettings();
      
      // Test 7: User Auth
      await testAuth();

      // Test 8: Time Check
      await testTime();

      displayResults();
    }

    async function testServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.ready;
          if (reg.active) {
            addTest('✅', 'Service Worker', 'Active and running', 'pass');
          } else {
            addTest('⚠️', 'Service Worker', 'Registered but not active', 'warn');
            diagnosticData.needsFix.push('Reload the page to activate service worker');
          }
        } catch (e) {
          addTest('❌', 'Service Worker', 'Error: ' + e.message, 'fail');
          diagnosticData.needsFix.push('Service worker failed to load');
        }
      } else {
        addTest('❌', 'Service Worker', 'Not supported on this browser', 'fail');
        diagnosticData.needsFix.push('Browser does not support service workers');
      }
    }

    async function testPushManager() {
      if ('PushManager' in window) {
        addTest('✅', 'Push Manager', 'Supported', 'pass');
      } else {
        addTest('❌', 'Push Manager', 'Not supported', 'fail');
        diagnosticData.needsFix.push('Browser does not support push notifications');
      }
    }

    async function testPermission() {
      const permission = Notification.permission;
      if (permission === 'granted') {
        addTest('✅', 'Permission', 'Granted', 'pass');
      } else if (permission === 'denied') {
        addTest('❌', 'Permission', 'Denied - Go to browser settings to enable', 'fail');
        diagnosticData.needsFix.push('Enable notifications in browser settings');
      } else {
        addTest('⚠️', 'Permission', 'Not requested yet', 'warn');
        diagnosticData.needsFix.push('Enable notifications in User Menu');
      }
    }

    async function testSubscription() {
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        
        if (sub) {
          diagnosticData.subscription = sub.toJSON();
          addTest('✅', 'Push Subscription', 
            'Active<br>Endpoint: ' + sub.endpoint.substring(0, 50) + '...', 'pass');
        } else {
          addTest('❌', 'Push Subscription', 'No active subscription found', 'fail');
          diagnosticData.needsFix.push('Enable notifications to create subscription');
        }
      } catch (e) {
        addTest('❌', 'Push Subscription', 'Error checking: ' + e.message, 'fail');
      }
    }

    async function testDatabase() {
      try {
        const response = await fetch('/api/subs');
        if (!response.ok) throw new Error('API error');
        
        const allSubs = await response.json();
        diagnosticData.totalSubs = allSubs.length;
        
        if (diagnosticData.subscription) {
          const found = allSubs.some(s => s.endpoint === diagnosticData.subscription.endpoint);
          if (found) {
            addTest('✅', 'Database', 
              `Your subscription is saved<br>Total subscriptions: ${allSubs.length}`, 'pass');
          } else {
            addTest('❌', 'Database', 
              `Your subscription NOT in database<br>Total: ${allSubs.length} (yours missing)`, 'fail');
            diagnosticData.needsFix.push('Subscription needs to be saved to database');
            diagnosticData.canAutoFix = true;
          }
        } else {
          addTest('⚠️', 'Database', `${allSubs.length} subscriptions found (can't verify yours)`, 'warn');
        }
      } catch (e) {
        addTest('❌', 'Database', 'Cannot reach API: ' + e.message, 'fail');
        diagnosticData.needsFix.push('Check API connection');
      }
    }

    async function testSettings() {
      const settings = localStorage.getItem('notification_settings');
      if (settings) {
        try {
          const parsed = JSON.parse(settings);
          const activeReminders = Object.values(parsed.reminders || {})
            .filter(r => r.enabled).length;
          
          diagnosticData.settings = parsed;
          
          if (parsed.enabled && activeReminders > 0) {
            addTest('✅', 'Settings', 
              `Enabled with ${activeReminders} active reminders`, 'pass');
          } else if (!parsed.enabled) {
            addTest('⚠️', 'Settings', 'Notifications disabled in settings', 'warn');
            diagnosticData.needsFix.push('Enable notifications in User Menu');
          } else {
            addTest('⚠️', 'Settings', 'No reminders configured', 'warn');
            diagnosticData.needsFix.push('Configure reminder times in User Menu');
          }
        } catch (e) {
          addTest('❌', 'Settings', 'Invalid settings data', 'fail');
        }
      } else {
        addTest('❌', 'Settings', 'Not configured', 'fail');
        diagnosticData.needsFix.push('Configure notification settings');
      }
    }

    async function testAuth() {
      try {
        const { supabase } = await import('./Core/Supabase.js');
        const { data: { session } } = await supabase.auth.getSession();
        
        if (session?.user) {
          diagnosticData.userId = session.user.id;
          addTest('✅', 'Authentication', 
            `Logged in<br>User ID: ${session.user.id.substring(0, 20)}...`, 'pass');
        } else {
          addTest('❌', 'Authentication', 'Not logged in', 'fail');
          diagnosticData.needsFix.push('Log in to your account');
        }
      } catch (e) {
        addTest('⚠️', 'Authentication', 'Cannot verify: ' + e.message, 'warn');
      }
    }

    async function testTime() {
      const now = new Date();
      const localTime = now.toLocaleTimeString();
      const utcTime = now.toUTCString();
      
      const settings = diagnosticData.settings;
      if (settings?.reminders) {
        const times = Object.entries(settings.reminders)
          .filter(([_, r]) => r.enabled)
          .map(([period, r]) => `${period}: ${r.time}`)
          .join('<br>');
        
        addTest('🕐', 'Time & Schedule', 
          `Local: ${localTime}<br>UTC: ${utcTime}<br><br>Scheduled:<br>${times || 'None'}`, 'pass');
      } else {
        addTest('🕐', 'Time Check', `Local: ${localTime}<br>UTC: ${utcTime}`, 'pass');
      }
    }

    function addTest(icon, title, details, status) {
      diagnosticData.tests.push({ icon, title, details, status });
      if (status === 'pass') diagnosticData.summary.passed++;
      else if (status === 'fail') diagnosticData.summary.failed++;
      else diagnosticData.summary.warnings++;
    }

    function displayResults() {
      const resultsDiv = document.getElementById('results');
      
      let html = `
        <div class="summary">
          <div class="summary-item">
            <span>✅ Passed</span>
            <strong>${diagnosticData.summary.passed}</strong>
          </div>
          <div class="summary-item">
            <span>⚠️ Warnings</span>
            <strong>${diagnosticData.summary.warnings}</strong>
          </div>
          <div class="summary-item">
            <span>❌ Failed</span>
            <strong>${diagnosticData.summary.failed}</strong>
          </div>
        </div>
      `;

      diagnosticData.tests.forEach(test => {
        html += `
          <div class="test-item ${test.status}">
            <div class="test-header">
              <div class="test-icon">${test.icon}</div>
              <div class="test-title">${test.title}</div>
            </div>
            <div class="test-details">${test.details}</div>
          </div>
        `;
      });

      if (diagnosticData.needsFix.length > 0) {
        html += `
          <div class="action-needed">
            <h3>🔧 Actions Needed:</h3>
            <ul>
              ${diagnosticData.needsFix.map(fix => `<li>${fix}</li>`).join('')}
            </ul>
          </div>
        `;
        
        if (diagnosticData.canAutoFix) {
          document.getElementById('fixIssues').style.display = 'block';
        }
      }

      // Copy diagnostic data
      const diagnosticJson = JSON.stringify(diagnosticData, null, 2);
      html += `
        <button class="copy-btn" onclick="navigator.clipboard.writeText(\`${diagnosticJson.replace(/`/g, '\\`')}\`).then(() => alert('Diagnostic data copied!'))">
          📋 Copy Full Diagnostic Data
        </button>
      `;

      resultsDiv.innerHTML = html;
    }

    async function autoFix() {
      if (!diagnosticData.subscription || !diagnosticData.userId) {
        alert('Cannot auto-fix: Missing subscription or user ID');
        return;
      }

      const fixBtn = document.getElementById('fixIssues');
      fixBtn.textContent = '⏳ Fixing...';
      fixBtn.disabled = true;

      try {
        const { supabase } = await import('./Core/Supabase.js');
        const { data: { session } } = await supabase.auth.getSession();

        const response = await fetch('/api/save-sub', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`
          },
          body: JSON.stringify({
            ...diagnosticData.subscription,
            user_id: diagnosticData.userId
          })
        });

        if (response.ok) {
          alert('✅ Fixed! Subscription saved to database. Run diagnostic again to verify.');
          location.reload();
        } else {
          const error = await response.json();
          alert('❌ Fix failed: ' + error.error);
        }
      } catch (e) {
        alert('❌ Error: ' + e.message);
      } finally {
        fixBtn.textContent = '🔧 Auto-Fix Issues';
        fixBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
