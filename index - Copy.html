  <!-- ===== Boot: apply theme & dark mode before first paint ===== -->
  <script>
  (function() {
    try {
      var dark = localStorage.getItem('darkMode') === 'enabled';
      var skin = localStorage.getItem('activeTheme') || 'default';

      if (skin !== 'default') {
        document.body.classList.add(skin);
        var skinLink = document.getElementById('skin_' + skin);
        if (skinLink) skinLink.media = 'all';
      } else if (dark) {
        var dmLink = document.getElementById('dark-mode-css');
        if (dmLink) dmLink.media = 'all';
      }

      if (dark) document.body.classList.add('dark-mode');
    } catch(e) {
      // localStorage unavailable (private browsing) — continue with defaults
    }
  })();
  </script>

  <!-- ===== External Dependencies (deferred — non-blocking) ===== -->
  <!-- pdf-lib loaded on demand by features that need it; not needed at boot -->
  <script>
  // Lazy-load pdf-lib only when first needed (avoids 166 KB blocking parse at startup)
  window.loadPdfLib = (function() {
    var promise = null;
    return function() {
      if (window.PDFLib) return Promise.resolve(window.PDFLib);
      if (promise) return promise;
      promise = new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
        s.crossOrigin = 'anonymous';
        s.onload  = function() { resolve(window.PDFLib); };
        s.onerror = function() { reject(new Error('pdf-lib failed to load')); };
        document.head.appendChild(s);
      });
      return promise;
    };
  })();
  </script>

  <!-- ===== Bootstrap Application ===== -->
  <script type="module">
    async function init() {
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        // Delay SW registration until after load to not compete with critical resources
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./service-worker.js', { scope: '/' })
            .catch(function(err) { console.error('[SW] Registration failed:', err); });
        });
      }

      try {
        // Load data modules in parallel
        const [aff, { QUOTES, getRandomQuote, getQuoteOfTheDay }] = await Promise.all([
          import('./Features/Data/AffirmationsList.js'),
          import('./Features/Data/QuotesList.js')
        ]);

        window.affirmations  = aff.default;
        window.QuotesData    = { QUOTES, getRandomQuote, getQuoteOfTheDay };

        // Load core modules
        const Core            = await import('./Core/Index.js');
        const { default: UserTab } = await import('./Core/User-Tab.js');

        // Initialize application
        window.app = new Core.ProjectCuriosityApp({
          AppState:          Core.AppState,
          AuthManager:       Core.AuthManager,
          NavigationManager: Core.NavigationManager,
          DashboardManager:  Core.DashboardManager,
          UserTab
        });

        window.app.init();
      } catch (e) {
        console.error('[FATAL] Bootstrap failed:', e);
        document.body.innerHTML = [
          '<div style="padding:2rem;text-align:center;font-family:system-ui">',
          '<h1>Loading Error</h1>',
          '<p>Unable to load the application. Please refresh the page.</p>',
          '<p style="color:#666;font-size:0.875rem;margin-top:1rem">',
          'If the problem persists, try clearing your browser cache.</p>',
          '<button onclick="location.reload()" ',
          'style="margin-top:1.5rem;padding:0.75rem 2rem;background:#6b9b37;color:#fff;',
          'border:none;border-radius:8px;font-size:1rem;cursor:pointer">',
          'Retry</button></div>'
        ].join('');
      }
    }

    document.readyState === 'loading'
      ? document.addEventListener('DOMContentLoaded', init)
      : init();
  </script>

  <!-- ===== Theme Management ===== -->
  <script>
  window.setSkin = function(name) {
    if (window.app && window.app.userTab && window.app.userTab.switchTheme) {
      window.app.userTab.switchTheme(name);
      return;
    }
    // Fallback path (before app is ready)
    document.querySelectorAll('link[id^="skin_"]').forEach(function(l) { l.media = 'not all'; });
    if (name !== 'default') {
      var wanted = document.getElementById('skin_' + name);
      if (wanted) wanted.media = 'all';
      var dm = document.getElementById('dark-mode-css');
      if (dm) dm.media = 'not all';
    } else if (localStorage.getItem('darkMode') === 'enabled') {
      var dm2 = document.getElementById('dark-mode-css');
      if (dm2) dm2.media = 'all';
    }
    try { localStorage.setItem('activeTheme', name); } catch(e) {}
  };

  window.shareTheme = function(name) {
    try { localStorage.setItem('activeTheme', name); } catch(e) {}
    window.setSkin(name);
  };

  window.setDark = function(enable) {
    try { localStorage.setItem('darkMode', enable ? 'enabled' : 'disabled'); } catch(e) {}
    document.body.classList.toggle('dark-mode', enable);
    var premiumActive = document.querySelector('link[id^="skin_"][media="all"]');
    if (!premiumActive) {
      var dm = document.getElementById('dark-mode-css');
      if (dm) dm.media = enable ? 'all' : 'not all';
    }
  };
  </script>
