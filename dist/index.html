  <!-- PWA install toast — only in browser display mode, deferred until load -->
  <script>
  !function(){
    // Capture install prompt as early as possible
    window._pwaInstallPrompt=null;
    window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();window._pwaInstallPrompt=e});

    if(!window.matchMedia('(display-mode: browser)').matches)return;
    window.addEventListener('load',function(){
      setTimeout(function(){
        if(!window._pwaInstallPrompt)return;
        var t=document.createElement('button');
        t.id='pwa-install-toast';
        t.setAttribute('aria-label','Install The Curiosity Path');
        t.innerHTML=
          '<span class="pwa-toast-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>'+
          '<span class="pwa-toast-title">Install The Curiosity Path</span>'+
          '<span class="pwa-toast-subtitle">Add to your home screen for the best experience</span>'+
          '<button id="pwa-install-dismiss" aria-label="Dismiss">&#x2715;</button>'+
          '<div id="pwa-toast-progress"><div id="pwa-toast-progress-bar"></div></div>';
        document.body.appendChild(t);
        // Double rAF ensures transition fires after paint
        requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('visible')})});
        var timer=setTimeout(dismiss,10000);
        function dismiss(){
          clearTimeout(timer);
          t.classList.remove('visible');
          setTimeout(function(){t.parentNode&&t.remove()},400);
        }
        t.addEventListener('click',function(){
          if(!window._pwaInstallPrompt)return;
          window._pwaInstallPrompt.prompt();
          window._pwaInstallPrompt.userChoice.then(function(){window._pwaInstallPrompt=null;dismiss()});
        });
        document.getElementById('pwa-install-dismiss').addEventListener('click',function(e){e.stopPropagation();dismiss()});
      },2500);
    });
  }()
  </script>

  <!-- Theme API — exposed on window for UserTab.switchTheme and legacy callers -->
  <script>
  !function(){
    // setSkin: activate a named skin or fall back to dark-mode/default
    window.setSkin=function(name){
      if(window.app&&window.app.userTab&&window.app.userTab.switchTheme){window.app.userTab.switchTheme(name);return}
      document.querySelectorAll('link[id^="skin_"]').forEach(function(l){l.media='not all'});
      if(name!=='default'){
        var s=document.getElementById('skin_'+name);
        if(s)s.media='all';
        var d=document.getElementById('dark-mode-css');
        if(d)d.media='not all';
      } else if(localStorage.getItem('darkMode')==='enabled'){
        var d2=document.getElementById('dark-mode-css');
        if(d2)d2.media='all';
      }
      try{localStorage.setItem('activeTheme',name)}catch(e){}
    };
    // setDark: toggle dark mode independent of premium skins
    window.setDark=function(on){
      try{localStorage.setItem('darkMode',on?'enabled':'disabled')}catch(e){}
      document.body.classList.toggle('dark-mode',on);
      if(!document.querySelector('link[id^="skin_"][media="all"]')){
        var d=document.getElementById('dark-mode-css');
        if(d)d.media=on?'all':'not all';
      }
    };
    // shareTheme: alias kept for any external callers
    window.shareTheme=window.setSkin;
  }()
  </script>
</body>
</html>
