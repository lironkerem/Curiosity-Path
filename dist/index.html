      cursor: pointer;

      padding: 3px;
    }
    .tab-dot img {

      height: 100%;

    }
    .tab-dot.active {

    /* ── PWA Install Toast — entire toast is the install button ── */
    #pwa-install-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      background: #c4ad91;
      border-radius: 20px;
      padding: 0.875rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      column-gap: 0.75rem;
      box-shadow:
        10px 10px 20px #a08968,
        -6px -6px 12px #e0d4bf,
        inset 1px 1px 2px #ebe2d4;
      z-index: 9999;
      font-family: 'Cinzel', 'Georgia', serif;
      color: #3d2f1f;
      transition: opacity 400ms ease, transform 400ms ease, box-shadow 150ms ease;
      width: max-content;
      max-width: calc(100vw - 2rem);
      box-sizing: border-box;
      border: none;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    #pwa-install-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #pwa-install-toast:hover {
      box-shadow:
        14px 14px 28px #a08968,
        -10px -10px 20px #e0d4bf,
        inset 1px 1px 2px #ebe2d4,
        0 4px 24px rgba(107,155,55,.25);
    }
    #pwa-install-toast:active {
      box-shadow:
        inset 5px 5px 10px #a08968,
        inset -3px -3px 6px #e0d4bf;
      transform: translateX(-50%) translateY(0) scale(0.98);
    }
    #pwa-install-toast .pwa-toast-icon {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #pwa-install-toast .pwa-toast-icon svg {
      width: 28px;
      height: 28px;
      stroke: #6b9b37;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    #pwa-install-toast .pwa-toast-title {
      grid-column: 2;
      grid-row: 1;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b9b37;
      letter-spacing: 0.04em;
      line-height: 1.3;
      white-space: nowrap;
    }
    #pwa-install-toast .pwa-toast-subtitle {
      grid-column: 2;
      grid-row: 2;
      font-size: 0.72rem;
      font-family: system-ui, sans-serif;
      color: #6d5a42;
      line-height: 1.3;
      white-space: nowrap;
    }
    #pwa-install-dismiss {
      grid-column: 3;
      grid-row: 1 / 3;
      background: none;
      border: none;
      color: #a08968;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.25rem 0.25rem 0.25rem 0.5rem;
      line-height: 1;
      transition: color 150ms ease;
      align-self: center;
      position: relative;
      z-index: 1;
    }
    #pwa-install-dismiss:hover { color: #3d2f1f; }
    #pwa-toast-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background: rgba(107,155,55,0.15);
      border-radius: 0 0 20px 20px;
      overflow: hidden;
      pointer-events: none;
    }
    #pwa-toast-progress-bar {
      height: 100%;
      width: 100%;
      background: #6b9b37;
      transform-origin: left;
      animation: pwa-progress 10s linear forwards;
    }
    @keyframes pwa-progress {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

  <!-- ===== Boot: apply theme & dark mode before first paint ===== -->
  <script>
  (function() {
    try {
      var dark = localStorage.getItem('darkMode') === 'enabled';
      var skin = localStorage.getItem('activeTheme') || 'default';
      if (skin !== 'default') {
        document.body.classList.add(skin);
        var skinLink = document.getElementById('skin_' + skin);
        if (skinLink) skinLink.media = 'all';
      } else if (dark) {
        var dmLink = document.getElementById('dark-mode-css');
        if (dmLink) dmLink.media = 'all';
        document.body.classList.add('dark-mode');
      }
    } catch(e) {}
  })();
  </script>

  <!-- ===== External Dependencies ===== -->
  <script>
  window.loadPdfLib = (function() {
    var promise = null;
    return function() {
      if (window.PDFLib) return Promise.resolve(window.PDFLib);
      if (promise) return promise;
      promise = new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
        s.crossOrigin = 'anonymous';
        s.onload  = function() { resolve(window.PDFLib); };
        s.onerror = function() { reject(new Error('pdf-lib failed to load')); };
        document.head.appendChild(s);
      });
      return promise;
    };
  })();
  </script>

  <!-- ===== PWA Install Toast ===== -->
  <script>
  (function() {
    if (!window.matchMedia('(display-mode: browser)').matches) return;

    window.addEventListener('load', function() {
      setTimeout(function() {
        if (!window._pwaInstallPrompt) return;

        var toast = document.createElement('button');
        toast.id = 'pwa-install-toast';
        toast.setAttribute('role', 'button');
        toast.setAttribute('aria-label', 'Install The Curiosity Path');
        toast.innerHTML =
          '<span class="pwa-toast-icon">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
              '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
              '<polyline points="7 10 12 15 17 10"/>' +
              '<line x1="12" y1="15" x2="12" y2="3"/>' +
            '</svg>' +
          '</span>' +
          '<span class="pwa-toast-title">Install The Curiosity Path</span>' +
          '<span class="pwa-toast-subtitle">Add to your home screen for the best experience</span>' +
          '<button id="pwa-install-dismiss" aria-label="Dismiss">&#x2715;</button>' +
          '<div id="pwa-toast-progress"><div id="pwa-toast-progress-bar"></div></div>';
        document.body.appendChild(toast);

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            toast.classList.add('visible');
          });
        });

        var autoDismissTimer = setTimeout(dismiss, 10000);

        function dismiss() {
          clearTimeout(autoDismissTimer);
          toast.classList.remove('visible');
          setTimeout(function() { if (toast.parentNode) toast.remove(); }, 400);
        }

        toast.addEventListener('click', function() {
          if (!window._pwaInstallPrompt) return;
          window._pwaInstallPrompt.prompt();
          window._pwaInstallPrompt.userChoice.then(function() {
            window._pwaInstallPrompt = null;
            dismiss();
          });
        });

        document.getElementById('pwa-install-dismiss').addEventListener('click', function(e) {
          e.stopPropagation();
          dismiss();
        });

      }, 2500);
    });
  })();
  </script>

  <!-- ===== Theme Management ===== -->
  <script>
  window.setSkin = function(name) {
    if (window.app && window.app.userTab && window.app.userTab.switchTheme) {
      window.app.userTab.switchTheme(name);
      return;
    }
    document.querySelectorAll('link[id^="skin_"]').forEach(function(l) { l.media = 'not all'; });
    if (name !== 'default') {
      var wanted = document.getElementById('skin_' + name);
      if (wanted) wanted.media = 'all';
      var dm = document.getElementById('dark-mode-css');
      if (dm) dm.media = 'not all';
    } else if (localStorage.getItem('darkMode') === 'enabled') {
      var dm2 = document.getElementById('dark-mode-css');
      if (dm2) dm2.media = 'all';
    }
    try { localStorage.setItem('activeTheme', name); } catch(e) {}
  };

  window.shareTheme = function(name) {
    try { localStorage.setItem('activeTheme', name); } catch(e) {}
    window.setSkin(name);
  };

  window.setDark = function(enable) {
    try { localStorage.setItem('darkMode', enable ? 'enabled' : 'disabled'); } catch(e) {}
    document.body.classList.toggle('dark-mode', enable);
    var premiumActive = document.querySelector('link[id^="skin_"][media="all"]');
    if (!premiumActive) {
      var dm = document.getElementById('dark-mode-css');
      if (dm) dm.media = enable ? 'all' : 'not all';
    }
  };
  </script>
