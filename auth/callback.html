<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Signing you in…</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #c4ad91;
      font-family: 'Cinzel', Georgia, serif;
      color: #3d2f1f;
    }
    .spinner {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid #a08968;
      border-top-color: #6b9b37;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { text-align: center; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.85rem; opacity: 0.75; }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p>Signing you in…</p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';

    const supabase = createClient(
      'https://qfbarhxfmzpgbgkaymuk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmYmFyaHhmbXpwZ2Jna2F5bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ1ODg4MjEsImV4cCI6MjA4MDE2NDgyMX0.twBWw0dZnLRTWTHav0sJ77GXyvsGR3ZgPplRO2vVSFk',
      { auth: { detectSessionInUrl: true, persistSession: true, storage: window.localStorage } }
    );

    // Supabase detects the tokens in the URL hash and stores the session
    const { data: { session }, error } = await supabase.auth.getSession();

    if (session) {
      // Session stored — redirect back to app
      window.location.replace('/');
    } else if (error) {
      console.error('Auth callback error:', error);
      window.location.replace('/');
    } else {
      // Give Supabase a moment to process the URL hash tokens
      setTimeout(() => window.location.replace('/'), 1500);
    }
  </script>
</body>
</html>
