<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Signing you in…</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#c4ad91; font-family:'Cinzel',Georgia,serif; color:#3d2f1f; }
    .spinner { width:40px; height:40px; border-radius:50%; border:3px solid #a08968; border-top-color:#6b9b37; animation:spin 0.9s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { text-align:center; letter-spacing:0.1em; text-transform:uppercase; font-size:0.85rem; opacity:0.75; }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p>Signing you in…</p>
  </div>
  <script>
    (function() {
      // Parse tokens from URL hash
      var hash   = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var accessToken  = params.get('access_token');
      var refreshToken = params.get('refresh_token');
      var expiresIn    = params.get('expires_in');
      var expiresAt    = params.get('expires_at');
      var tokenType    = params.get('token_type') || 'bearer';

      if (accessToken && refreshToken) {
        // Store session in localStorage exactly as Supabase expects
        // Key format: sb-<project-ref>-auth-token
        var sessionData = {
          access_token:  accessToken,
          refresh_token: refreshToken,
          expires_in:    expiresIn ? parseInt(expiresIn) : 3600,
          expires_at:    expiresAt ? parseInt(expiresAt) : Math.floor(Date.now()/1000) + 3600,
          token_type:    tokenType
        };
        localStorage.setItem(
          'sb-qfbarhxfmzpgbgkaymuk-auth-token',
          JSON.stringify(sessionData)
        );
      }

      // Redirect back to app
      window.location.replace('/');
    })();
  </script>
</body>
</html>
