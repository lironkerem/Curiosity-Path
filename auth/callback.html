<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Signing you in…</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #c4ad91; font-family: Georgia, serif; color: #3d2f1f; padding: 1rem; }
    #log { font-size: 0.75rem; word-break: break-all; max-width: 100%; }
  </style>
</head>
<body>
  <div id="log">Starting…<br></div>
  <script type="module">
    const log = (msg) => { document.getElementById('log').innerHTML += msg + '<br>'; };

    log('hash: ' + window.location.hash.substring(0, 80));
    log('search: ' + window.location.search.substring(0, 80));

    const hash   = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const at = params.get('access_token');
    const rt = params.get('refresh_token');

    log('access_token: ' + (at ? at.substring(0,20) + '...' : 'NONE'));
    log('refresh_token: ' + (rt ? rt.substring(0,20) + '...' : 'NONE'));

    if (!at) {
      log('Also checking search params…');
      const sp = new URLSearchParams(window.location.search);
      log('code: ' + (sp.get('code') || 'NONE'));
      log('error: ' + (sp.get('error') || 'NONE'));
    }
  </script>
</body>
</html>
