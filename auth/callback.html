<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Signing you in…</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#c4ad91; font-family:Georgia,serif; color:#3d2f1f; padding:1rem; }
    #log { font-size:0.8rem; word-break:break-all; text-align:center; }
  </style>
</head>
<body>
  <div id="log">Starting…<br></div>
  <script>
    var log = function(m) { document.getElementById('log').innerHTML += m + '<br>'; };

    var hash   = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var at = params.get('access_token');
    var rt = params.get('refresh_token');

    log('access_token: ' + (at ? 'YES' : 'NO'));
    log('refresh_token: ' + (rt ? 'YES' : 'NO'));

    if (at && rt) {
      var sessionData = {
        access_token:  at,
        refresh_token: rt,
        expires_in:    3600,
        expires_at:    Math.floor(Date.now()/1000) + 3600,
        token_type:    'bearer'
      };
      localStorage.setItem('sb-qfbarhxfmzpgbgkaymuk-auth-token', JSON.stringify(sessionData));
      log('Session stored in localStorage');
      log('Firing deep link...');
      window.location.replace('curiositypath://login-callback');
      log('Deep link fired (you should not see this)');
    } else {
      log('ERROR: No tokens found in URL');
    }
  </script>
</body>
</html>
