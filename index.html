  <!-- ===== Theme activation before first paint ===== -->
  <script>
  (function(){
    const dark = localStorage.getItem('darkMode') === 'enabled';
    const skin = localStorage.getItem('activeTheme') || 'default';
    document.documentElement.classList.toggle('dark', dark);

    if (skin !== 'default') {
      const l = document.getElementById('skin_' + skin);
      if (l) l.disabled = false;          // premium skin on
      // premium CSS has its own dark rules → keep default dark sheet off
    } else if (dark) {
      document.getElementById('dark-mode-css').disabled = false; // default dark on
    }
  })();
  </script>

  <script type="module">
    async function init(){
      console.log('🚀 The Curiosity Path - Aanandoham\'s Spiritual Platform Online');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('✅ Service Worker registered:', reg))
          .catch(err => console.error('❌ Service Worker registration failed:', err));
      }
      try{
        const [aff,{QUOTES,getRandomQuote,getQuoteOfTheDay}]=await Promise.all([
          import('./Features/Data/AffirmationsList.js'),
          import('./Features/Data/QuotesList.js')
        ]);
        window.affirmations=aff.default;
        window.QuotesData={QUOTES,getRandomQuote,getQuoteOfTheDay};

        const Core=await import('./Core/Index.js');
        const {default:UserTab}=await import('./Core/User-Tab.js');

        window.app=new Core.ProjectCuriosityApp({
          AppState:          Core.AppState,
          AuthManager:       Core.AuthManager,
          NavigationManager: Core.NavigationManager,
          DashboardManager:  Core.DashboardManager,
          UserTab
        });
        window.app.init();
      }catch(e){console.error('Bootstrap failed:',e)}
    }
    document.readyState==='loading'
      ? document.addEventListener('DOMContentLoaded',init)
      : init();
  </script>

  <!-- ===== Theme-switch helpers ===== -->
  <script>
  window.setSkin=function(name){
    document.querySelectorAll('link[id^="skin_"]').forEach(l=>l.disabled=true);
    document.getElementById('dark-mode-css').disabled=true; // premium on → default dark off
    if(name!=='default'){
      const wanted=document.getElementById('skin_'+name);
      if(wanted) wanted.disabled=false;
    }else if(localStorage.getItem('darkMode')==='enabled'){
      document.getElementById('dark-mode-css').disabled=false; // back to default
    }
    localStorage.setItem('activeTheme',name);
  };
  window.setDark=function(enable){
    localStorage.setItem('darkMode',enable?'enabled':'disabled');
    document.documentElement.classList.toggle('dark',enable);
    const premiumActive=document.querySelector('link[id^="skin_"]:not([disabled])');
    if(!premiumActive){ // only toggle default dark when no premium skin
      document.getElementById('dark-mode-css').disabled=!enable;
    }
  };
  </script>
