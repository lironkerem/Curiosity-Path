<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=yes">
  <meta name="description" content="The Curiosity Path - Step into your next level">
  <meta name="permissions-policy" content="camera=(self)">
  <title>The Curiosity Path - by Aanandoham</title>

  <!-- ===== CDN Preconnect ===== -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <!-- ===== CSS ===== -->
  <!-- 1. base look (always on) -->
  <link rel="stylesheet" href="/CSS/main-styles.css?v=1.0.2">

  <!-- 2. default dark-mode sheet (disabled by default) -->
  <link rel="preload" href="/CSS/dark-mode.css" as="style">
  <link rel="stylesheet" href="/CSS/dark-mode.css" id="dark-mode-css" disabled>

  <!-- 3. premium skins – preload + disabled -->
  <link rel="preload" href="/CSS/Skins/champagne-gold.css" as="style">
  <link rel="preload" href="/CSS/Skins/royal-indigo.css"   as="style">
  <link rel="preload" href="/CSS/Skins/earth-luxury.css"   as="style">
  <link rel="preload" href="/CSS/Skins/matrix-code.css"    as="style">

  <link rel="stylesheet" href="/CSS/Skins/champagne-gold.css" id="skin_champagne-gold" disabled>
  <link rel="stylesheet" href="/CSS/Skins/royal-indigo.css"   id="skin_royal-indigo"   disabled>
  <link rel="stylesheet" href="/CSS/Skins/earth-luxury.css"   id="skin_earth-luxury"   disabled>
  <link rel="stylesheet" href="/CSS/Skins/matrix-code.css"    id="skin_matrix-code"    disabled>

  <!-- 4. mobile sheet -->
  <link rel="stylesheet" href="/CSS/mobile-styles.css" media="(max-width:1024px)">

  <!-- 5. tailwind (if still needed) -->
  <link rel="stylesheet" href="/CSS/tailwind-output.css">

  <!-- ===== Theme activation before first paint ===== -->
  <script>
  (function(){
    const dark = localStorage.getItem('darkMode') === 'enabled';
    const skin = localStorage.getItem('activeTheme') || 'default';
    document.documentElement.classList.toggle('dark', dark);

    if (skin !== 'default') {
      const l = document.getElementById('skin_' + skin);
      if (l) l.disabled = false;          // premium skin on
      // premium CSS has its own dark rules → keep default dark sheet off
    } else if (dark) {
      document.getElementById('dark-mode-css').disabled = false; // default dark on
    }
  })();
  </script>

  <!-- ===== PWA / icons ===== -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3F7652">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="The Curiosity Path">
  <link rel="apple-touch-icon" href="Public/Icons/apple-touch-icon.png">
  <link rel="icon" href="Public/Icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="Public/Icons/favicon.ico">

  <script>
  // Share theme function - switches theme without navigation
  window.shareTheme = function(name) {
    localStorage.setItem('activeTheme', name);
    window.setSkin(name);
  };
  </script>
</head>

<body>
  <div id="auth-screen"></div>
  <div id="app-container">
    <div id="main-app" class="hidden">
      <main id="main-content">
        <div id="dashboard-tab" class="tab-content active"></div>
        <div id="calculator-tab" class="tab-content hidden" aria-live="polite"></div>
        <div id="flip-script-tab" class="tab-content hidden"></div>
        <div id="meditations-tab" class="tab-content hidden"></div>
        <div id="tarot-tab" class="tab-content hidden"></div>
        <div id="energy-tab" class="tab-content hidden"></div>
        <div id="happiness-tab" class="tab-content hidden"></div>
        <div id="gratitude-tab" class="tab-content hidden"></div>
        <div id="journal-tab" class="tab-content hidden"></div>
        <div id="karma-shop-tab" class="tab-content hidden"></div>
        <div id="shadow-alchemy-tab" class="tab-content hidden"></div>
        <div id="chatbot-tab" class="tab-content hidden"></div>
      </main>
      <div id="modal-container"></div>
      <div id="audio-player" class="hidden"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- ===== External Dependencies ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" 
          crossorigin="anonymous"></script>

  <!-- ===== Application Scripts ===== -->
  <script src="/CSS/Skins/MatrixRain.js?v=1.0.4"></script>
  <script type="module" src="./Core/Utils.js"></script>
  <script defer src="./Features/TarotVisionAI.js"></script>
  <script type="module" src="./Features/TarotEngine.js"></script>
  <script type="module" src="./Core/GamificationEngine.js"></script>
  <script type="module" src="./Features/KarmaShopEngine.js"></script>
  <script type="module" src="./Features/EnergyTracker.js"></script>
  <script type="module" src="./Core/Features.js"></script>
  <script src="./Features/WellnessKit.js"></script>

  <!-- ===== Bootstrap Application ===== -->
  <script type="module">
    async function init() {
      console.log('[INIT] The Curiosity Path - Aanandoham\'s Spiritual Platform Online');
      
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('[SW] Service Worker registered:', reg))
          .catch(err => console.error('[SW ERROR] Service Worker registration failed:', err));
      }

      try {
        // Load data modules
        const [aff, {QUOTES, getRandomQuote, getQuoteOfTheDay}] = await Promise.all([
          import('./Features/Data/AffirmationsList.js'),
          import('./Features/Data/QuotesList.js')
        ]);
        
        window.affirmations = aff.default;
        window.QuotesData = {QUOTES, getRandomQuote, getQuoteOfTheDay};

        // Load core modules
        const Core = await import('./Core/Index.js');
        const {default: UserTab} = await import('./Core/User-Tab.js');

        // Initialize application
        window.app = new Core.ProjectCuriosityApp({
          AppState:          Core.AppState,
          AuthManager:       Core.AuthManager,
          NavigationManager: Core.NavigationManager,
          DashboardManager:  Core.DashboardManager,
          UserTab
        });
        
        window.app.init();
      } catch(e) {
        console.error('[FATAL] Bootstrap failed:', e);
        document.body.innerHTML = '<div style="padding:2rem;text-align:center;font-family:system-ui"><h1>Loading Error</h1><p>Unable to load the application. Please refresh the page.</p><p style="color:#666;font-size:0.875rem;margin-top:1rem">If the problem persists, try clearing your browser cache.</p></div>';
      }
    }

    // Start initialization
    document.readyState === 'loading'
      ? document.addEventListener('DOMContentLoaded', init)
      : init();
  </script>

  <!-- ===== Theme Management ===== -->
  <script>
  // Set active skin theme
  window.setSkin = function(name) {
    // Disable all premium skins
    document.querySelectorAll('link[id^="skin_"]').forEach(l => l.disabled = true);
    document.getElementById('dark-mode-css').disabled = true; // premium on → default dark off
    
    if (name !== 'default') {
      const wanted = document.getElementById('skin_' + name);
      if (wanted) wanted.disabled = false;
    } else if (localStorage.getItem('darkMode') === 'enabled') {
      document.getElementById('dark-mode-css').disabled = false; // back to default
    }
    
    localStorage.setItem('activeTheme', name);
  };

  // Toggle dark mode
  window.setDark = function(enable) {
    localStorage.setItem('darkMode', enable ? 'enabled' : 'disabled');
    document.documentElement.classList.toggle('dark', enable);
    
    // Only toggle default dark when no premium skin is active
    const premiumActive = document.querySelector('link[id^="skin_"]:not([disabled])');
    if (!premiumActive) {
      document.getElementById('dark-mode-css').disabled = !enable;
    }
  };
  </script>
</body>
</html>
