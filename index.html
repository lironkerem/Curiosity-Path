<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=yes">
  <meta name="description" content="The Curiosity Path - Step into your next level">
  <meta name="permissions-policy" content="camera=(self)">
  <title>The Curiosity Path - by Aanandoham</title>

  <!-- ① Theme injector (unchanged) -->
  <script data-cfasync="false">
    const t = localStorage.getItem('activeTheme') || 'default';
    document.write(
      (t === 'default' ? '' :
       '<link rel="preload" as="style" href="/Assets/CSS/Skins/' + t + '.css" onload="this.rel=\'stylesheet\'">') +
      '<link rel="stylesheet" href="/Assets/CSS/Skins/' + t + '.css">' +
      '<link rel="preload" as="style" href="/Assets/CSS/main-styles.css" onload="this.rel=\'stylesheet\'">' +
      '<link rel="stylesheet" href="/Assets/CSS/main-styles.css">' +
      '<link rel="preload" as="style" href="/Assets/CSS/mobile-styles.css" media="(max-width:1024px)" onload="this.rel=\'stylesheet\'">' +
      '<link rel="stylesheet" href="/Assets/CSS/mobile-styles.css" media="(max-width:1024px)">'
    );
  </script>

  <!-- ② Dark-mode only when wanted -->
  <script data-cfasync="false">
    if (localStorage.getItem('darkMode') === 'enabled') {
      document.write('<link rel="stylesheet" href="/Assets/CSS/dark-mode.css">');
    }
  </script>

  <!-- ③ Service-worker register (one-liner) -->
  <script>
    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('./service-worker.js');
  </script>

  <!-- ④ Share helper (tiny) -->
  <script>
    window.shareTheme = name => {
      localStorage.setItem('activeTheme', name);
      location.href = '/' + name;
    };
  </script>

  <!-- ===== rest of your head ===== -->
  <link rel="stylesheet" href="/Assets/CSS/tailwind-output.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3F7652">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="The Curiosity Path">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <link rel="icon" href="Icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="Icons/favicon.ico">
</head>

<body>
  <!-- ===== Auth Gate ===== -->
  <div id="auth-screen"></div>

  <!-- ===== App Shell ===== -->
  <div id="app-container">
    <div id="main-app" class="hidden">
      <main id="main-content">
        <div id="dashboard-tab" class="tab-content active"></div>
        <div id="calculator-tab" class="tab-content hidden" aria-live="polite"></div>
        <div id="flip-script-tab" class="tab-content hidden"></div>
        <div id="meditations-tab" class="tab-content hidden"></div>
        <div id="tarot-tab" class="tab-content hidden"></div>
        <div id="energy-tab" class="tab-content hidden"></div>
        <div id="happiness-tab" class="tab-content hidden"></div>
        <div id="gratitude-tab" class="tab-content hidden"></div>
        <div id="journal-tab" class="tab-content hidden"></div>
        <div id="karma-shop-tab" class="tab-content hidden"></div>
        <div id="shadow-alchemy-tab" class="tab-content hidden"></div>
        <div id="chatbot-tab" class="tab-content hidden"></div>
      </main>
      <div id="modal-container"></div>
      <div id="audio-player" class="hidden"></div>
    </div>
  </div>

  <!-- ===== Global UI ===== -->
  <div id="toast-container"></div>

  <!-- ===== Dark-mode toggle helper ===== -->
  <script>document.body.classList.toggle('dark-mode', localStorage.getItem('darkMode') === 'enabled');</script>

  <!-- ===== Core & Features ===== -->
  <script type="module" src="./Core/Utils.js"></script>
  <script defer src="./Features/TarotVisionAI.js"></script>
  <script type="module" src="./Features/TarotEngine.js"></script>
  <script type="module" src="./Features/GamificationEngine.js"></script>
  <script type="module" src="./Features/KarmaShopEngine.js"></script>
  <script type="module" src="./Features/EnergyTracker.js"></script>
  <script type="module" src="./Core/Features.js"></script>
  <script src="./Features/WellnessKit.js"></script>
<script src="/Assets/CSS/Skins/MatrixRain.js?v=1.0.0"></script>

  <!-- ===== Bootstrap ===== -->
  <script type="module">
    async function init(){
      console.log('🚀 Digital Curiosity - Aanandoham\'s Spiritual Platform Online');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('✅ SW registered:', reg))
          .catch(err => console.error('❌ SW registration failed:', err));
      }
      try{
        const [aff,{QUOTES,getRandomQuote,getQuoteOfTheDay}]=await Promise.all([
          import('./Features/Data/AffirmationsList.js'),
          import('./Features/Data/QuotesList.js')
        ]);
        window.affirmations=aff.default;
        window.QuotesData={QUOTES,getRandomQuote,getQuoteOfTheDay};

        const Core=await import('./Core/Index.js');
        const {default:UserTab}=await import('./Core/User-Tab.js');

        window.app=new Core.ProjectCuriosityApp({
          AppState:          Core.AppState,
          AuthManager:       Core.AuthManager,
          NavigationManager: Core.NavigationManager,
          DashboardManager:  Core.DashboardManager,
          UserTab
        });
        window.app.init();
      }catch(e){console.error('Bootstrap failed:',e)}
    }
    document.readyState==='loading'
      ? document.addEventListener('DOMContentLoaded',init)
      : init();
  </script>
</body>
</html>
